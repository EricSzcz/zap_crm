{% extends "admin_panel/base.html" %}

{% block title %}{{ action }} — Zap CRM{% endblock %}

{% block panel_content %}
<div class="d-flex align-items-center mb-3">
  <a href="{% url 'admin_panel:user_list' %}" class="btn btn-sm btn-outline-secondary me-3">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h4 class="mb-0">{{ action }}</h4>
</div>

<div class="card border-0 shadow-sm" style="max-width:540px;">
  <div class="card-body p-4">
    <form method="post" novalidate>
      {% csrf_token %}
      {% for field in form %}
        <div class="mb-3">
          <label class="form-label fw-medium" for="{{ field.id_for_label }}">
            {{ field.label }}
            {% if field.field.required %}<span class="text-danger">*</span>{% endif %}
          </label>
          {{ field }}
          {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors.0 }}</div>{% endif %}
        </div>
      {% endfor %}
      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'admin_panel:user_list' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
